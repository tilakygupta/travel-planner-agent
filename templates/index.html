<!DOCTYPE html>
<html>
<head>
  <title>Travel Planner Agent</title>
  <style>
    body { font-family: Arial; max-width: 700px; margin: 40px auto; padding: 20px; }
    #chat-box { height: 400px; border: 1px solid #ddd; overflow-y: auto;
                padding: 16px; border-radius: 8px; margin-bottom: 12px; }
    .user-msg { background: #0f62fe; color: white; padding: 10px 14px;
                border-radius: 12px; margin: 8px 0; max-width: 80%; margin-left: auto; }
    .bot-msg  { background: #f4f4f4; padding: 10px 14px; border-radius: 12px;
                margin: 8px 0; max-width: 85%; white-space: pre-wrap; }
    #input-row { display: flex; gap: 8px; }
    input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
    button { background: #0f62fe; color: white; border: none;
             padding: 10px 20px; border-radius: 6px; cursor: pointer; }
  </style>
</head>
<body>
  <h2>✈️ Travel Planner Agent (IBM Granite)</h2>
  <div id="chat-box">
    <div class="bot-msg">Hello! I'm your AI Travel Planner powered by IBM Granite.
Where would you like to travel? Tell me your destination, budget, and travel dates!</div>
  </div>
  <div id="input-row">
    <input id="msg" type="text" placeholder="Ask about your trip..."
           onkeypress="if(event.key==='Enter') sendMessage()" />
    <button onclick="sendMessage()">Send</button>
  </div>
  <script>
    async function sendMessage() {
      const input = document.getElementById('msg');
      const msg = input.value.trim();
      if (!msg) return;
      const box = document.getElementById('chat-box');
      box.innerHTML += `<div class="user-msg">${msg}</div>`;
      input.value = '';
      box.innerHTML += `<div class="bot-msg" id="loading">Thinking...</div>`;
      box.scrollTop = box.scrollHeight;
      const res = await fetch('/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({message: msg})
      });
      const data = await res.json();
      document.getElementById('loading').remove();
      box.innerHTML += `<div class="bot-msg">${data.response}</div>`;
      box.scrollTop = box.scrollHeight;
    }
  </script>
</body>
</html>
